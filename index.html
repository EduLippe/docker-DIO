<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Site</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            height: 100vh;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            display: flex;
            justify-content: center;
            align-items: center;
            color: #f1f5f9;
        }

        .card {
            background: #020617;
            padding: 40px 60px;
            border-radius: 16px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 10px;
            color: #38bdf8;
        }

        p {
            color: #cbd5f5;
            margin-bottom: 20px;
        }

        .status {
            display: inline-block;
            padding: 8px 18px;
            border-radius: 999px;
            background: #22c55e;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>🚀 Site Online</h1>
        <p>Seu container está rodando com sucesso!</p>
        <span class="status">Funcionando</span>
    </div>
</body>
</html>
